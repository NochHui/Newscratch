<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volleyball Reaction Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f6ff;
            margin-top: 50px;
        }

        h1 {
            color: #2c3e50;
        }

        #box {
            width: 200px;
            height: 200px;
            background-color: red;
            margin: 50px auto;
            display: none;
            cursor: pointer;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>🏐 Volleyball Reaction Game</h1>
<p>Click the box as fast as you can when it appears!</p>

<button onclick="startGame()">Start</button>

<div id="box"></div>

<div id="result"></div>

<script>
    let startTime;

    function startGame() {
        document.getElementById("result").innerText = "Wait for it...";
        
        let delay = Math.random() * 3000 + 1000;

        setTimeout(() => {
            let box = document.getElementById("box");
            box.style.display = "block";
            box.style.backgroundColor = "green";

            startTime = Date.now();

            box.onclick = function () {
                let reactionTime = Date.now() - startTime;
                document.getElementById("result").innerText =
                    "Your reaction time: " + reactionTime + " ms";

                box.style.display = "none";
            };

        }, delay);
    }
</script>

</div>

</body>
</html>
